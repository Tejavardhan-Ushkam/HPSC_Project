# DEM Simulator – default configuration (N=200, multi-particle)
# Lines starting with # are comments.

# Domain dimensions
lx = 1.0
ly = 1.0
lz = 1.0

# Gravity (m/s^2)
gx = 0.0
gy = 0.0
gz = -9.81

# Contact model
kn      = 1.0e5
gamma_n = 50.0

# Time stepping
dt      = 1.0e-5
t_final = 0.5

# Particles
n_particles = 200
particle_r  = 0.02
particle_m  = 1.0

# OpenMP threads
n_threads = 4

# Output every 1ms
output_interval = 1.0e-3

# Initialisation mode: 1=random cloud
init_mode   = 1
random_seed = 42
